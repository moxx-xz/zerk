<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zerk — Prueba de conexión</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #0D0F12;
      color: #EAEAEA;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background-color: #1A1D23;
      border: 1px solid #2B2D42;
      border-radius: 12px;
      padding: 40px 48px;
      text-align: center;
      max-width: 420px;
      width: 90%;
    }

    .logo {
      font-size: 48px;
      font-weight: 700;
      color: #E63946;
      letter-spacing: 4px;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 14px;
      color: #8D99AE;
      margin-bottom: 32px;
    }

    .status {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background-color: #0D0F12;
      border-radius: 8px;
      padding: 14px 20px;
      margin-bottom: 12px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background-color: #2ECC71;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .status p {
      font-size: 14px;
      color: #2ECC71;
    }

    .info {
      font-size: 12px;
      color: #8D99AE;
      margin-top: 24px;
    }

    .info span {
      color: #E63946;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">ZERK</div>
    <p class="subtitle">Plataforma Web Integrada de Videojuegos</p>

    <div class="status">
      <div class="dot"></div>
      <p>Repositorio conectado correctamente</p>
    </div>

    <p class="info">Git + GitHub funcionando — <span>PIA 2025</span></p>
  </div>
</body>
</html>
